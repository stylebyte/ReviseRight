<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RightRevise</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <link rel="icon" type="image/png" href="favicon.png">
</head>



<body>

    <div class="head position-relative d-flex align-items-center p-3" style= " background:lightblue;">
        <img src="favicon.png" class="img-fuild me-4" style="width :150px; height: auto;">
        <div class="position-absolute top-50 start-50 translate-middle text-center me-5" style="color:rgb(15, 0, 66);">
            <h2 class="mb-0">Welcome To RightRevise</h2>
            <p class = "mb-0">Revise smart. Stay consistent.</p>
        </div>
    </div>

    
    <div class="container mt-5">
        <form id="loginForm">
            <div class="row mb-3">
                <div class="col-md-4 fw-semibold" style="color:rgb(15, 0, 66);">
                    <label for="USERNAME">EMAIL</label>
                </div>

                <div class="col-md-8">
                    <input type="text" name="email" id="USERNAME" class="form-control" placeholder="Enter your name">
                </div>
            </div>

            <div class="row mb-3">
                    <div class="col-md-4 fw-semibold" style="color:rgb(15, 0, 66);">
                        <label for="PASSWORD">PASSWORD</label>
                    </div>

                    <div class="col-md-8" style="color:rgb(15, 0, 66);">
                        <input type="password" name="password" id="PASSWORD"  class="form-control" placeholder="Enter password">
                    </div>
            </div>

            <div class="row">
                <div class="col-md-8 offset-md-4">
                    <button type="submit" class="btn px-4 py-2 fw-semibold" style="background-color:rgb(15, 0, 66);color:azure;">
                        Submit
                    </button>
                </div>
            </div>
        </form>

    </div>

    <script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let formData = new FormData(this);
    formData.append("action", "login");

   fetch("validation.php", {
    method: "POST",
    body: formData,
    credentials: "same-origin"
})
    .then(res => res.json())
    .then(data => {
        alert(data.message);

        if (data.status === "success") {
            window.location.href = "home2.php";
        }
    });
});
</script>
</body>
</html>
